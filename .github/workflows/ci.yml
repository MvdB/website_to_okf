name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        # The unit tests are pure/offline, so they only need the light deps the
        # tested modules import -- not the full crawl4ai/playwright browser stack.
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pydantic pydantic-settings PyYAML python-slugify
      - name: Lint
        run: ruff check website_to_okf tests
      - name: Test
        run: pytest -q
